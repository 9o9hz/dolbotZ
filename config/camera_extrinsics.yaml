# camera_extrinsics.yaml
#
# elevation_map_node / flat_drive_node 공용 카메라 마운트 파라미터.
# 두 노드가 동일한 카메라(주행용 D435I, 시리얼 339222071362)를 보고 있으므로
# 같은 값을 공유한다.
#
# *** 실측 전 임시값입니다. *** 아래 값은 각 노드 소스의 declare_parameter
# 기본값을 그대로 옮겨 적은 PLACEHOLDER이며, 실제 카메라 마운트 각도/높이를
# 줄자+수평계 등으로 실측하거나 config/calibration/ 캘리브레이션 스크립트
# 결과가 준비되면 이 파일의 값을 갱신할 것.
#
# 사용법:
#   ros2 run dolbotz elevation_map --ros-args --params-file config/camera_extrinsics.yaml
#   ros2 run dolbotz flat_drive    --ros-args --params-file config/camera_extrinsics.yaml
#
# 참고: config/calibration/에 해당 카메라 serial_no의 캘리브레이션 피클이
# 있으면, 노드가 시작할 때 이 파일(또는 코드 기본값)보다 그 피클 값을
# 우선한다 (dolbotz.utils.paths.load_calibration 참고). 피클이 없으면 이
# 파일(또는 코드 기본값)이 그대로 쓰인다.

elevation_map_node:
  ros__parameters:
    camera_height_m: 0.5
    camera_pitch_offset_deg: 10.0
    camera_roll_offset_deg: 0.0
    complementary_filter_alpha: 0.97

flat_drive_node:
  ros__parameters:
    camera_height_m: 0.5
    camera_pitch_offset_deg: 10.0
    camera_roll_offset_deg: 0.0
    complementary_filter_alpha: 0.97
